<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap');
    @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap');

    :root{
      --paper:#f4efe6; --paper-2:#faf6ee; --ink:#191512; --ink-2:#4c463d; --ink-3:#8a8272;
      --line:#191512; --hair:#d8d0c0;
      --ai:#7c3aed; --design:#e8551e; --sec:#b0208f; --av:#0e8ba0;
      --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
      --sans:"Satoshi","Helvetica Neue",system-ui,Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:500;line-height:1.5;
      -webkit-font-smoothing:antialiased;font-feature-settings:"ss01";display:flex;flex-direction:column;overflow:hidden}
    a{color:inherit;text-decoration:none}
    ::selection{background:var(--ink);color:var(--paper)}
    .mono{font-variant-numeric:tabular-nums;letter-spacing:.02em}

    /* ---------- TOPBAR ---------- */
    .topbar{flex-shrink:0;border-bottom:1.5px solid var(--line);background:var(--paper);
      display:flex;align-items:center;gap:22px;padding:14px clamp(18px,3vw,34px);flex-wrap:wrap}
    .brand{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.2vw,40px);line-height:.9;letter-spacing:-.02em}
    .brand .dot{color:var(--design)}
    .tabs{display:flex;gap:8px}
    .tab{border:1.5px solid var(--line);background:transparent;color:var(--ink);padding:9px 18px;border-radius:999px;
      font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
      display:inline-flex;align-items:center;gap:9px;transition:background .15s,color .15s}
    .tab .n{font-weight:500;color:var(--ink-3);font-variant-numeric:tabular-nums}
    .tab:hover{background:var(--ink);color:var(--paper)} .tab:hover .n{color:rgba(244,239,230,.65)}
    .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .tab.active .n{color:rgba(244,239,230,.7)}
    .topbar .spacer{flex:1}
    .ext{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;
      display:inline-flex;align-items:center;gap:6px}
    .ext:hover{color:var(--ink)}
    .ext .arw{transition:transform .25s} .ext:hover .arw{transform:translateX(3px)}

    /* ---------- STAGE (iframe + rail) ---------- */
    .stage{flex:1;display:flex;min-height:0}
    .frame{flex:1;position:relative;min-width:0;background:var(--paper-2)}
    .frame iframe{width:100%;height:100%;border:0;display:block;background:#fff}
    .frame .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-family:var(--serif);font-size:26px;color:var(--ink-3);pointer-events:none;transition:opacity .3s}
    .frame.ready .loading{opacity:0}

    /* ---------- RAIL (NOTION card fixo) ---------- */
    .rail{flex-shrink:0;width:clamp(280px,26vw,340px);border-left:1.5px solid var(--line);background:var(--paper);
      overflow-y:auto;padding:clamp(16px,2vw,24px)}
    .card{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;background:transparent;
      display:flex;flex-direction:column;transition:box-shadow .18s,background .18s}
    .card:hover{background:var(--paper-2);box-shadow:5px 5px 0 var(--cc)}
    .card .bar{height:5px;background:var(--cc)}
    .card .pad{padding:20px;display:flex;flex-direction:column;gap:13px}
    .card .khead{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
    .card .kname{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
    .card .tag{font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;color:var(--cc);
      border:1.5px solid var(--cc);padding:3px 8px;border-radius:999px;line-height:1}
    .card .big{display:flex;align-items:baseline;gap:10px}
    .card .num{font-family:var(--serif);font-weight:400;font-size:56px;line-height:.8;letter-spacing:-.02em}
    .card .unit{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
    .card .list{list-style:none;display:flex;flex-direction:column;gap:14px}
    .card .kitem{display:flex;flex-direction:column;gap:5px;padding-left:13px;position:relative}
    .card .kitem::before{content:"—";position:absolute;left:0;top:1px;color:var(--cc)}
    .card .kt{font-family:var(--serif);font-size:16px;line-height:1.1;letter-spacing:-.01em;color:var(--ink)}
    .card .kt:hover{color:var(--cc)}
    .card .kp{font-size:12.5px;line-height:1.45;color:var(--ink-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card .ksub{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
    .card .subtag{font-size:9px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;color:var(--ink-3);
      border:1.5px solid var(--hair);padding:2px 7px;border-radius:999px;line-height:1.35}
    .card .subtag:hover{border-color:var(--cc);color:var(--cc)}
    .card .empty2{font-size:13px;color:var(--ink-3)}
    /* todas as subpáginas */
    .card .pgsec{display:flex;flex-direction:column;gap:7px}
    .card .pglist{display:flex;flex-direction:column;gap:6px}
    .card .pglink{font-size:13px;color:var(--ink-2);padding-left:14px;position:relative;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card .pglink::before{content:"›";position:absolute;left:0;color:var(--cc);font-weight:700}
    .card .pglink:hover{color:var(--cc)}
    /* to-dos */
    .card .todos{display:flex;flex-direction:column;gap:7px}
    .card .todohead{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
    .card .todo{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.35;color:var(--ink-2)}
    .card .todo .box{flex-shrink:0;width:14px;height:14px;border:1.5px solid var(--ink-3);border-radius:4px;margin-top:1px;
      display:inline-flex;align-items:center;justify-content:center;font-size:10px;line-height:1;color:var(--paper)}
    .card .todo.done .box{background:var(--cc);border-color:var(--cc)}
    .card .todo.done span{color:var(--ink-3);text-decoration:line-through}
    .card .kfoot{margin-top:2px;padding-top:12px;border-top:1.5px solid var(--hair);display:flex;
      align-items:center;justify-content:space-between}
    .card .when{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:700}
    .card .go{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);font-weight:700;
      display:inline-flex;align-items:center;gap:6px}
    .card .go:hover{color:var(--cc)} .card .go .arw{transition:transform .25s} .card:hover .go .arw{transform:translateX(4px)}
    .card.err .bar{background:var(--ink-3)} .card.err .msg{font-size:13px;color:var(--sec);font-weight:700}
    .rail .railcap{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:700;margin-bottom:13px}

    /* ---------- responsivo ---------- */
    @media(max-width:820px){
      body{overflow:auto}
      .stage{flex-direction:column-reverse}
      .rail{width:auto;border-left:0;border-top:1.5px solid var(--line)}
      .frame{height:78vh}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Dash<span class="dot">.</span></span>
    <nav class="tabs" id="tabs"></nav>
    <span class="spacer"></span>
    <a class="ext" id="ext" target="_blank" rel="noopener">abrir em nova aba <span class="arw">→</span></a>
  </div>

  <div class="stage">
    <div class="frame" id="frame">
      <div class="loading">carregando…</div>
      <iframe id="app" title="app"></iframe>
    </div>
    <aside class="rail">
      <div class="railcap">fixo</div>
      <div id="notion"></div>
    </aside>
  </div>

  <script>
    const esc = (s)=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
    const TABS = [
      { key:"refs",     label:"REFS",     cc:"var(--design)" },
      { key:"latefeed", label:"LATEFEED", cc:"var(--av)" },
    ];
    let cards = {}, active = null;

    function selectTab(key){
      active = key;
      const c = cards[key] || {};
      const t = TABS.find(t=>t.key===key);
      document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active", el.dataset.key===key));
      const frame = document.getElementById("frame");
      const iframe = document.getElementById("app");
      frame.classList.remove("ready");
      if (c.url){ iframe.src = c.url; document.getElementById("ext").href = c.url; }
      else { iframe.removeAttribute("src"); }
      iframe.onload = ()=>frame.classList.add("ready");
    }

    function renderTabs(){
      const nav = document.getElementById("tabs");
      nav.innerHTML = TABS.map(t=>{
        const c = cards[t.key] || {};
        const n = c.ok && typeof c.count==="number" ? `<span class="n mono">${c.count}</span>` : "";
        return `<button class="tab" data-key="${t.key}" style="--cc:${t.cc}">${t.label}${n}</button>`;
      }).join("");
      nav.querySelectorAll(".tab").forEach(el=>el.onclick=()=>selectTab(el.dataset.key));
    }

    function renderNotion(){
      const c = cards.notion || {};
      const cc = "var(--ai)";
      const box = document.getElementById("notion");
      if (!c.ok){
        box.innerHTML = `<div class="card err" style="--cc:${cc}"><div class="bar"></div>
          <div class="pad"><div class="khead"><span class="kname">Notion · IMPORT</span></div>
          <div class="msg">${esc(c.error||"indisponível")}</div></div></div>`;
        return;
      }
      const when = c.updatedAt ? new Date(c.updatedAt).toLocaleDateString("pt-BR") : "";
      const item = (r)=>{
        const sub = (r.subpages&&r.subpages.length)
          ? `<div class="ksub">${r.subpages.map(s=>`<a class="subtag" href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`).join("")}</div>`
          : "";
        const prev = r.preview ? `<div class="kp">${esc(r.preview)}</div>` : "";
        return `<div class="kitem"><a class="kt" href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title||"(sem título)")}</a>${prev}${sub}</div>`;
      };
      const list = (c.recent&&c.recent.length)
        ? `<div class="list">${c.recent.map(item).join("")}</div>`
        : `<div class="empty2">nada recente</div>`;
      const allp = (c.allpages&&c.allpages.length)
        ? `<div class="pgsec"><div class="todohead">Todas as subpáginas · ${c.allpages.length}</div>
            <div class="pglist">${c.allpages.map(p=>`<a class="pglink" href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a>`).join("")}</div></div>`
        : "";
      const todos = (c.todos&&c.todos.length)
        ? `<div class="todos"><div class="todohead">To-do</div>${c.todos.map(t=>
            `<div class="todo ${t.checked?"done":""}"><span class="box">${t.checked?"✓":""}</span><span>${esc(t.text||"")}</span></div>`).join("")}</div>`
        : "";
      box.innerHTML = `<div class="card" style="--cc:${cc}"><div class="bar"></div><div class="pad">
        <div class="khead"><span class="kname">Notion · IMPORT</span><span class="tag">real</span></div>
        <div class="big"><span class="num mono">${c.count.toLocaleString("pt-BR")}</span><span class="unit">${esc(c.label||"itens")}</span></div>
        ${list}
        ${allp}
        ${todos}
        <div class="kfoot"><span class="when">${when||"—"}</span>
          <a class="go" href="${esc(c.url)}" target="_blank" rel="noopener">abrir <span class="arw">→</span></a></div>
      </div>`;
    }

    async function load(){
      try{
        const r = await fetch("/api/stats");
        const data = await r.json();
        cards = Object.fromEntries(data.cards.map(c=>[c.key,c]));
      }catch(e){ cards = {}; }
      renderTabs();
      renderNotion();
      if (!active) selectTab(cards.refs?.url ? "refs" : TABS[0].key);
    }
    load();
  </script>
</body>
</html>
