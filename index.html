<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap');
    @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap');

    :root{
      --paper:#f4efe6; --paper-2:#faf6ee; --ink:#191512; --ink-2:#4c463d; --ink-3:#8a8272;
      --line:#191512; --hair:#d8d0c0;
      --ai:#7c3aed; --design:#e8551e; --sec:#b0208f; --av:#0e8ba0;
      --serif:"DM Serif Display",Georgia,"Times New Roman",serif;
      --sans:"Satoshi","Helvetica Neue",system-ui,Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:500;line-height:1.5;
      -webkit-font-smoothing:antialiased;font-feature-settings:"ss01";display:flex;flex-direction:column;overflow:hidden}
    a{color:inherit;text-decoration:none}
    ::selection{background:var(--ink);color:var(--paper)}
    .mono{font-variant-numeric:tabular-nums;letter-spacing:.02em}

    /* ---------- TOPBAR ---------- */
    .topbar{flex-shrink:0;border-bottom:1.5px solid var(--line);background:var(--paper);
      display:flex;align-items:center;gap:22px;padding:14px clamp(18px,3vw,34px);flex-wrap:wrap}
    .brand{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.2vw,40px);line-height:.9;letter-spacing:-.02em}
    .brand .dot{color:var(--design)}
    .tabs{display:flex;gap:8px}
    .tab{border:1.5px solid var(--line);background:transparent;color:var(--ink);padding:9px 18px;border-radius:999px;
      font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
      display:inline-flex;align-items:center;gap:9px;transition:background .15s,color .15s}
    .tab .n{font-weight:500;color:var(--ink-3);font-variant-numeric:tabular-nums}
    .tab:hover{background:var(--ink);color:var(--paper)} .tab:hover .n{color:rgba(244,239,230,.65)}
    .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .tab.active .n{color:rgba(244,239,230,.7)}
    .topbar .spacer{flex:1}
    .ext{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;
      display:inline-flex;align-items:center;gap:6px}
    .ext:hover{color:var(--ink)}
    .ext .arw{transition:transform .25s} .ext:hover .arw{transform:translateX(3px)}

    /* ---------- STAGE (iframe full-width) ---------- */
    .stage{flex:1;display:flex;min-height:0}
    .frame{flex:1;position:relative;min-width:0;background:var(--paper-2)}
    .frame iframe{width:100%;height:100%;border:0;display:block;background:#fff}
    .frame .msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
      font-family:var(--serif);font-size:26px;color:var(--ink-3);text-align:center;padding:24px;pointer-events:none;transition:opacity .3s}
    .frame .msg small{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
    .frame.ready .msg{opacity:0}

    @media(max-width:820px){ body{overflow:auto} .frame{height:88vh} }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Dash<span class="dot">.</span></span>
    <nav class="tabs" id="tabs"></nav>
    <span class="spacer"></span>
    <a class="ext" id="ext" target="_blank" rel="noopener">abrir em nova aba <span class="arw">→</span></a>
  </div>

  <div class="stage">
    <div class="frame" id="frame">
      <div class="msg" id="msg">carregando…</div>
      <iframe id="app" title="app"></iframe>
    </div>
  </div>

  <script>
    const TABS = [
      { key:"refs",     label:"REFS",     cc:"var(--design)" },
      { key:"latefeed", label:"LATEFEED", cc:"var(--av)" },
      { key:"appflowy", label:"APPFLOWY", cc:"var(--ai)" },
    ];
    let cards = {}, active = null;

    function selectTab(key){
      active = key;
      const c = cards[key] || {};
      document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active", el.dataset.key===key));
      const frame = document.getElementById("frame");
      const iframe = document.getElementById("app");
      const msg = document.getElementById("msg");
      const ext = document.getElementById("ext");
      frame.classList.remove("ready");
      if (c.url){
        msg.innerHTML = "carregando…";
        iframe.style.display = "block";
        iframe.src = c.url; ext.href = c.url; ext.style.visibility = "visible";
        iframe.onload = ()=>frame.classList.add("ready");
      } else {
        iframe.removeAttribute("src"); iframe.style.display = "none"; ext.style.visibility = "hidden";
        msg.innerHTML = key==="appflowy"
          ? 'AppFlowy ainda não configurado<small>defina APPFLOWY_URL (AppFlowy Web self-hosted)</small>'
          : 'fonte não configurada';
      }
    }

    function renderTabs(){
      const nav = document.getElementById("tabs");
      nav.innerHTML = TABS.map(t=>{
        const c = cards[t.key] || {};
        const n = c.ok && typeof c.count==="number" ? `<span class="n mono">${c.count}</span>` : "";
        return `<button class="tab" data-key="${t.key}" style="--cc:${t.cc}">${t.label}${n}</button>`;
      }).join("");
      nav.querySelectorAll(".tab").forEach(el=>el.onclick=()=>selectTab(el.dataset.key));
    }

    async function load(){
      try{
        const r = await fetch("/api/stats");
        const data = await r.json();
        cards = Object.fromEntries(data.cards.map(c=>[c.key,c]));
      }catch(e){ cards = {}; }
      renderTabs();
      if (!active) selectTab(cards.refs?.url ? "refs" : TABS[0].key);
    }
    load();
  </script>
</body>
</html>
